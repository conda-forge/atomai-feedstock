schema_version: 1

context:
  name: atomai
  version: "0.8.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/atomai-${{ version }}.tar.gz
  sha256: e7733ac866df51ea131c6c5b84a6357525d89b3ebf2c7177c4b7826e0a6e1939

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - pandas >=1.1.5
    - python >=${{ python_min }}
    - pytorch >=1.0.0
    - numpy >=1.18.5
    - matplotlib-base >=3.4
    - scipy >=1.3.0
    - scikit-learn >=0.22.1
    - scikit-image >=0.16.2
    - opencv >=4.1.0
    - networkx >=2.5
    - mendeleev <=0.6.1
    - torchvision >=0.13.0
    - progressbar2 >=3.38.0
    - gpytorch >=1.9.1

tests:
  - python:
      imports:
        - atomai
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Deep and machine learning for atom-resolved data
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pycroscopy/atomai/

extra:
  recipe-maintainers:
    - jan-janssen
